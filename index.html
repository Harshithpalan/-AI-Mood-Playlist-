<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD BEATS — AI Mood Playlist</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-light: #1a1a25;
            --border: #2a2a3a;
            --text: #e0e0e8;
            --text-dim: #6a6a7a;
            --happy: #ffb700;
            --sad: #4a9eff;
            --angry: #ff4444;
            --surprised: #ff44ff;
            --fearful: #8844ff;
            --disgusted: #44ff88;
            --neutral: #a0a0b0;
            --accent: #ff2d6a;
            --accent-glow: #ff2d6a55;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            min-height: 100vh;
        }
        
        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
                max-height: 200vh;
            }
        }
        
        /* Music Stage */
        .stage {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-right: 1px solid var(--border);
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            font-size: 28px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .logo span {
            color: var(--accent);
        }
        
        .session-info {
            display: flex;
            gap: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }
        
        /* Video Area */
        .music-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: radial-gradient(ellipse at center, #1a1a25 0%, #0a0a0f 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Vinyl Record */
        .vinyl-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
            perspective: 1000px;
        }
        
        .vinyl {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #111 0%, #222 10%, #111 20%, #222 30%, #111 40%, #222 50%, #111 60%, #222 70%, #111 80%, #222 90%, #111 100%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 60px rgba(0,0,0,0.3);
            animation: vinylSpin 3s linear infinite;
            transition: filter 0.3s ease;
        }
        
        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .vinyl.paused {
            animation-play-state: paused;
        }
        
        .vinyl-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .vinyl-label {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #cc2266 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        /* Equalizer */
        .equalizer-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 80px;
            margin-bottom: 30px;
        }
        
        .eq-bar {
            width: 8px;
            background: var(--accent);
            border-radius: 4px;
            animation: eqPulse 0.5s ease-in-out infinite alternate;
        }
        
        .eq-bar:nth-child(1) { animation-delay: 0s; }
        .eq-bar:nth-child(2) { animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { animation-delay: 0.3s; }
        .eq-bar:nth-child(5) { animation-delay: 0.4s; }
        .eq-bar:nth-child(6) { animation-delay: 0.5s; }
        .eq-bar:nth-child(7) { animation-delay: 0.6s; }
        .eq-bar:nth-child(8) { animation-delay: 0.7s; }
        
        @keyframes eqPulse {
            0% { height: 20%; }
            100% { height: 100%; }
        }
        
        /* Track Info */
        .track-info {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }
        
        .track-mood {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .track-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .track-desc {
            font-size: 14px;
            color: var(--text-dim);
        }
        
        /* Player Controls */
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        
        .player-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--surface-light);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .player-btn.primary {
            width: 72px;
            height: 72px;
            background: var(--accent);
            border-color: var(--accent);
            font-size: 28px;
            color: white;
        }
        
        /* Webcam */
        .webcam-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .webcam-label {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            padding: 2px 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-dim);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            font-size: 18px;
            color: var(--text-dim);
        }
        
        /* Control Panel */
        .panel {
            background: var(--surface);
            padding: 30px;
            overflow-y: auto;
            max-height: 100vh;
            border-left: 1px solid var(--border);
        }
        
        @media (max-width: 1100px) {
            .panel {
                max-height: auto;
                border-top: 1px solid var(--border);
                border-left: none;
            }
        }
        
        .panel-section {
            margin-bottom: 30px;
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        /* Current Mood Display */
        .current-mood-card {
            padding: 24px;
            background: var(--surface-light);
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .current-mood-emoji {
            font-size: 56px;
            margin-bottom: 10px;
        }
        
        .current-mood-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        
        .current-mood-confidence {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }
        
        /* Emotion Bars */
        .emotion-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .emotion-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .emotion-icon {
            width: 32px;
            font-size: 18px;
            text-align: center;
        }
        
        .emotion-track {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .emotion-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.1s ease;
        }
        
        .emotion-percent {
            width: 40px;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
            text-align: right;
        }
        
        /* Volume Control */
        .volume-section {
            padding: 20px;
            background: var(--surface-light);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .volume-icon {
            font-size: 20px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            border: none;
        }
        
        #bpmControl {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .volume-value {
            width: 40px;
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            text-align: right;
        }
        
        /* Mood History */
        .mood-history {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--surface-light);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        
        .history-time {
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
        }
        
        .history-mood {
            font-size: 18px;
        }
        
        .history-name {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
        }
        
        /* Session Stats */
        .session-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .session-stat {
            padding: 14px;
            background: var(--surface-light);
            border-radius: 12px;
            text-align: center;
        }
        
        .session-value {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
        }
        
        .session-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        
        /* Export Buttons */
        .export-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .export-btn {
            width: 100%;
            padding: 14px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .export-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        
        /* Hidden */
        .hidden {
            display: none !important;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--border);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="stage">
            <div class="stage-header">
                <div class="logo">
                    <span class="logo-icon">💿</span>
                    <span>MOOD BE<span>ATS</span></span>
                </div>
                <div class="session-info">
                    <div>⏱️ <span id="sessionTime">00:00:00</span></div>
                    <div>🎵 <span id="moodChanges">0</span></div>
                </div>
            </div>
            
            <div class="music-area">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading Face Detection...</div>
                </div>
                
                <div class="equalizer-container" id="equalizer">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
                
                <div class="vinyl-container">
                    <div class="vinyl" id="vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-label" id="vinylLabel">♪</div>
                        </div>
                    </div>
                </div>
                
                <div class="track-info">
                    <div class="track-mood" id="trackMood">😊</div>
                    <div class="track-title" id="trackTitle">Waiting for emotion...</div>
                    <div class="track-desc" id="trackDesc">Starting session...</div>
                </div>
                
                <div class="player-controls">
                    <button class="player-btn" id="prevBtn" title="Previous">⏮</button>
                    <button class="player-btn primary" id="playBtn" title="Play">▶</button>
                    <button class="player-btn" id="nextBtn" title="Next">⏭</button>
                    <button class="player-btn" id="shuffleBtn" title="Shuffle">🔀</button>
                </div>
                
                <video id="webcam" class="hidden"></video>
                <canvas id="canvas" class="hidden"></canvas>
                <div class="webcam-container">
                    <video id="webcam"></video>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-section">
                <div class="panel-title">Current Mood</div>
                <div class="current-mood-card">
                    <div class="current-mood-emoji" id="moodEmoji">😊</div>
                    <div class="current-mood-name" id="moodName">Neutral</div>
                    <div class="current-mood-confidence" id="moodConfidence">0%</div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">Emotion Analysis</div>
                <div class="emotion-bars" id="emotionBars">
                    <div class="emotion-bar">
                        <div class="emotion-icon">😄</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--happy)" data-emotion="happy"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="happy">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">😐</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--neutral)" data-emotion="neutral"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="neutral">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">😢</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--sad)" data-emotion="sad"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="sad">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">😠</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--angry)" data-emotion="angry"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="angry">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">😲</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--surprised)" data-emotion="surprised"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="surprised">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">😨</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--fearful)" data-emotion="fearful"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="fearful">0</span>%</div>
                    </div>
                    <div class="emotion-bar">
                        <div class="emotion-icon">🤢</div>
                        <div class="emotion-track"><div class="emotion-fill" style="background: var(--disgusted)" data-emotion="disgusted"></div></div>
                        <div class="emotion-percent"><span data-emotion-percent="disgusted">0</span>%</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">Volume & BPM</div>
                <div class="volume-section">
                    <div class="volume-row">
                        <div class="volume-icon">🔊</div>
                        <input type="range" id="volumeControl" min="0" max="100" value="50">
                        <div class="volume-value"><span id="volumeValue">50</span>%</div>
                    </div>
                </div>
                <div class="volume-section">
                    <div class="volume-row">
                        <div class="volume-icon">🎶</div>
                        <input type="range" id="bpmControl" min="60" max="180" value="120">
                        <div class="volume-value"><span id="bpmValue">120</span>BPM</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">Session Stats</div>
                <div class="session-stats">
                    <div class="session-stat">
                        <div class="session-value" id="statDuration">00:00</div>
                        <div class="session-label">Duration</div>
                    </div>
                    <div class="session-stat">
                        <div class="session-value" id="statChanges">0</div>
                        <div class="session-label">Changes</div>
                    </div>
                    <div class="session-stat">
                        <div class="session-value" id="statTracks">0</div>
                        <div class="session-label">Tracks</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">Mood History</div>
                <div class="mood-history" id="moodHistory"></div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">Export</div>
                <div class="export-buttons">
                    <button class="export-btn" id="exportJsonBtn">💾 Export JSON</button>
                    <button class="export-btn" id="exportCsvBtn">📊 Export CSV</button>
                    <button class="export-btn" id="shareBtn">📤 Share Playlist</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // MOOD BEATS - AI Mood Playlist Application
        // ============================================================================
        
        // Initialize AudioContext
        let audioContext = null;
        let analyser = null;
        let gainNode = null;
        
        function initAudioContext() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    gainNode = audioContext.createGain();
                    
                    gainNode.connect(analyser);
                    analyser.connect(audioContext.destination);
                    
                    gainNode.gain.value = 0.5;
                    
                    console.log('Audio context initialized');
                } catch (error) {
                    console.error('AudioContext initialization error:', error);
                }
            }
        }
        
        // Ensure audio context is initialized before any other code runs
        initAudioContext();
        
        // Emotion data and playlist mapping
        const emotionData = {
            happy: { emoji: '😄', name: 'Happy', bpm: 140, color: '#ffb700' },
            neutral: { emoji: '😐', name: 'Neutral', bpm: 100, color: '#a0a0b0' },
            sad: { emoji: '😢', name: 'Sad', bpm: 80, color: '#4a9eff' },
            angry: { emoji: '😠', name: 'Angry', bpm: 160, color: '#ff4444' },
            surprised: { emoji: '😲', name: 'Surprised', bpm: 150, color: '#ff44ff' },
            fearful: { emoji: '😨', name: 'Fearful', bpm: 120, color: '#8844ff' },
            disgusted: { emoji: '🤢', name: 'Disgusted', bpm: 110, color: '#44ff88' }
        };
        
        const playlists = {
            happy: ['Summer Vibes', 'Electric Dreams', 'Golden Hour', 'Party Mode', 'Uplifting', 'Energetic Soul', 'Sun Festival', 'Joy Ride'],
            neutral: ['Ambient Flow', 'Chill Waves', 'Peaceful Mind', 'Zen Garden', 'Soft Harmony', 'Night Sky', 'Calm Waters', 'Serene Beats'],
            sad: ['Rainy Day', 'Blue Moon', 'Melancholy', 'Heartache', 'Lonely Road', 'Tear Drops', 'Silent Night', 'Echo'],
            angry: ['Rock Storm', 'Heavy Thunder', 'Intense Heat', 'Rage Mode', 'Wild Fire', 'Dark Energy', 'Chaos', 'Power Surge'],
            surprised: ['Shock Wave', 'Sudden Joy', 'Wow Moment', 'Explosion', 'Flash Bang', 'Surprise Attack', 'Quick Rush', 'Twist'],
            fearful: ['Mystery', 'Dark Woods', 'Tension', 'Haunted', 'Suspense', 'Eerie Night', 'Shadows', 'Unknown'],
            disgusted: ['Dark Mood', 'Bitter Taste', 'Heavy Soul', 'Grim', 'Sour Note', 'Dark Corner', 'Toxic', 'Disgust']
        };
        
        // State management
        const state = {
            currentMood: 'neutral',
            isPlaying: false,
            currentTrackIndex: 0,
            volume: 50,
            bpm: 120,
            shuffle: false,
            moodHistory: [],
            sessionStart: Date.now(),
            moodChangeCount: 0,
            tracksPlayed: 0
        };
        
        // DOM elements
        const elements = {
            loadingOverlay: document.getElementById('loadingOverlay'),
            vinyl: document.getElementById('vinyl'),
            vinylLabel: document.getElementById('vinylLabel'),
            trackMood: document.getElementById('trackMood'),
            trackTitle: document.getElementById('trackTitle'),
            trackDesc: document.getElementById('trackDesc'),
            playBtn: document.getElementById('playBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            shuffleBtn: document.getElementById('shuffleBtn'),
            volumeControl: document.getElementById('volumeControl'),
            volumeValue: document.getElementById('volumeValue'),
            bpmControl: document.getElementById('bpmControl'),
            bpmValue: document.getElementById('bpmValue'),
            moodEmoji: document.getElementById('moodEmoji'),
            moodName: document.getElementById('moodName'),
            moodConfidence: document.getElementById('moodConfidence'),
            moodHistory: document.getElementById('moodHistory'),
            sessionTime: document.getElementById('sessionTime'),
            moodChanges: document.getElementById('moodChanges'),
            statDuration: document.getElementById('statDuration'),
            statChanges: document.getElementById('statChanges'),
            statTracks: document.getElementById('statTracks'),
            emotionBars: document.getElementById('emotionBars'),
            webcam: document.getElementById('webcam'),
            canvas: document.getElementById('canvas')
        };
        
        // Web Audio synthesis
        function playMoodMusic(mood) {
            try {
                const moodBpm = emotionData[mood]?.bpm || 100;
                const beatDuration = 60 / moodBpm;
                
                // Play a simple melody based on mood
                const frequencies = {
                    happy: [261.63, 329.63, 392, 523.25],
                    neutral: [261.63, 293.66, 329.63],
                    sad: [196, 220, 246.94],
                    angry: [329.63, 392, 523.25, 659.25],
                    surprised: [392, 523.25, 659.25, 784],
                    fearful: [220, 246.94, 293.66],
                    disgusted: [110, 123.47, 146.83]
                };
                
                const moodFreqs = frequencies[mood] || frequencies.neutral;
                
                // Clear any pending synthesis calls
                moodFreqs.forEach((freq, index) => {
                    const timeoutId = setTimeout(() => {
                        if (state.isPlaying) {
                            synthesizeNote(freq, beatDuration * 0.8, mood);
                        }
                    }, index * beatDuration * 1000);
                });
            } catch (error) {
                console.error('Music synthesis error:', error);
            }
        }
        
        function synthesizeNote(frequency, duration, mood) {
            try {
                if (!audioContext) {
                    initAudioContext();
                }
                
                // Resume if suspended
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const env = audioContext.createGain();
                
                osc.frequency.value = Math.max(20, Math.min(20000, frequency));
                osc.type = mood === 'angry' ? 'square' : mood === 'sad' ? 'sine' : 'triangle';
                
                env.gain.setValueAtTime(0.2, now);
                env.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.connect(env);
                env.connect(gainNode);
                
                osc.start(now);
                osc.stop(now + duration);
            } catch (error) {
                console.error('Synthesize note error:', error);
            }
        }
        
        // Update equalizer animation
        function updateEqualizer() {
            const bars = document.querySelectorAll('.eq-bar');
            bars.forEach(bar => {
                const height = 20 + Math.random() * 80;
                bar.style.height = height + '%';
            });
        }
        
        // Update display with mood info
        function updateMoodDisplay(emotions) {
            // Find dominant emotion
            let dominantEmotion = 'neutral';
            let maxConfidence = 0;
            
            for (const [emotion, value] of Object.entries(emotions)) {
                const confidence = Math.round(value * 100);
                if (confidence > maxConfidence) {
                    maxConfidence = confidence;
                    dominantEmotion = emotion;
                }
                
                // Update emotion bars
                const emotionPercent = document.querySelector(`[data-emotion-percent="${emotion}"]`);
                if (emotionPercent) {
                    emotionPercent.textContent = confidence;
                }
                const emotionFill = document.querySelector(`[data-emotion="${emotion}"]`);
                if (emotionFill) {
                    emotionFill.style.width = Math.max(confidence, 2) + '%';
                }
            }
            
            // Update current mood if changed
            if (dominantEmotion !== state.currentMood) {
                state.currentMood = dominantEmotion;
                state.moodChangeCount++;
                state.currentTrackIndex = state.shuffle ? Math.floor(Math.random() * playlists[dominantEmotion].length) : 0;
                
                addMoodHistory(dominantEmotion);
                
                if (state.isPlaying) {
                    playMoodMusic(dominantEmotion);
                }
            }
            
            // Update mood card
            const moodInfo = emotionData[dominantEmotion];
            elements.moodEmoji.textContent = moodInfo.emoji;
            elements.moodName.textContent = moodInfo.name;
            elements.moodConfidence.textContent = maxConfidence + '%';
            
            // Update track info
            elements.trackMood.textContent = moodInfo.emoji;
            const tracks = playlists[dominantEmotion];
            const trackIndex = Math.min(state.currentTrackIndex, tracks.length - 1);
            elements.trackTitle.textContent = tracks[trackIndex];
            elements.trackDesc.textContent = `${moodInfo.name} • ${trackIndex + 1} of ${tracks.length}`;
            
            // Update vinyl label
            elements.vinylLabel.textContent = moodInfo.emoji;
            
            // Update BPM display (read-only now)
            const bpm = moodInfo.bpm;
            elements.bpmValue.textContent = bpm;
            state.bpm = bpm;
        }
        
        // History management
        function addMoodHistory(mood) {
            const time = new Date().toLocaleTimeString();
            const moodInfo = emotionData[mood];
            
            state.moodHistory.push({ mood, time });
            
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div class="history-time">${time}</div>
                <div class="history-mood">${moodInfo.emoji}</div>
                <div class="history-name">${moodInfo.name}</div>
            `;
            
            elements.moodHistory.prepend(historyItem);
            
            if (elements.moodHistory.children.length > 10) {
                elements.moodHistory.removeChild(elements.moodHistory.lastChild);
            }
        }
        
        // Update session stats
        function updateSessionStats() {
            const elapsed = Math.floor((Date.now() - state.sessionStart) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;
            
            const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            elements.sessionTime.textContent = timeStr;
            elements.statDuration.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            elements.moodChanges.textContent = state.moodChangeCount;
            elements.statChanges.textContent = state.moodChangeCount;
            elements.statTracks.textContent = state.tracksPlayed;
        }
        
        // Player controls
        elements.playBtn.addEventListener('click', () => {
            try {
                // Initialize and resume audio context
                if (!audioContext) {
                    initAudioContext();
                }
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                state.isPlaying = !state.isPlaying;
                elements.playBtn.textContent = state.isPlaying ? '⏸' : '▶';
                elements.vinyl.classList.toggle('paused');
                
                if (state.isPlaying) {
                    playMoodMusic(state.currentMood);
                    state.tracksPlayed++;
                }
            } catch (error) {
                console.error('Play button error:', error);
            }
        });
        
        elements.nextBtn.addEventListener('click', () => {
            try {
                const tracks = playlists[state.currentMood];
                state.currentTrackIndex = (state.currentTrackIndex + 1) % tracks.length;
                elements.trackTitle.textContent = tracks[state.currentTrackIndex];
                elements.trackDesc.textContent = `${emotionData[state.currentMood].name} • ${state.currentTrackIndex + 1} of ${tracks.length}`;
                if (state.isPlaying) playMoodMusic(state.currentMood);
                state.tracksPlayed++;
            } catch (error) {
                console.error('Next button error:', error);
            }
        });
        
        elements.prevBtn.addEventListener('click', () => {
            try {
                const tracks = playlists[state.currentMood];
                state.currentTrackIndex = (state.currentTrackIndex - 1 + tracks.length) % tracks.length;
                elements.trackTitle.textContent = tracks[state.currentTrackIndex];
                elements.trackDesc.textContent = `${emotionData[state.currentMood].name} • ${state.currentTrackIndex + 1} of ${tracks.length}`;
                if (state.isPlaying) playMoodMusic(state.currentMood);
            } catch (error) {
                console.error('Prev button error:', error);
            }
        });
        
        elements.shuffleBtn.addEventListener('click', () => {
            try {
                state.shuffle = !state.shuffle;
                elements.shuffleBtn.style.opacity = state.shuffle ? '1' : '0.5';
                if (state.shuffle) {
                    state.currentTrackIndex = Math.floor(Math.random() * playlists[state.currentMood].length);
                    elements.trackTitle.textContent = playlists[state.currentMood][state.currentTrackIndex];
                }
            } catch (error) {
                console.error('Shuffle button error:', error);
            }
        });
        
        // Volume control
        elements.volumeControl.addEventListener('input', (e) => {
            try {
                if (!audioContext) {
                    initAudioContext();
                }
                
                state.volume = parseInt(e.target.value);
                elements.volumeValue.textContent = state.volume;
                gainNode.gain.value = state.volume / 100;
            } catch (error) {
                console.error('Volume control error:', error);
            }
        });
        
        // BPM control - display only (update when mood changes)
        elements.bpmControl.addEventListener('input', () => {
            // Prevent user input - just for display
            elements.bpmControl.value = state.bpm;
        });
        
        // Export functions
        document.getElementById('exportJsonBtn').addEventListener('click', () => {
            try {
                const data = {
                    sessionStart: new Date(state.sessionStart).toISOString(),
                    duration: Date.now() - state.sessionStart,
                    moodChanges: state.moodChangeCount,
                    tracksPlayed: state.tracksPlayed,
                    history: state.moodHistory
                };
                const json = JSON.stringify(data, null, 2);
                downloadFile('mood-beats-export.json', json, 'application/json');
            } catch (error) {
                console.error('Export JSON error:', error);
                alert('Error exporting JSON');
            }
        });
        
        document.getElementById('exportCsvBtn').addEventListener('click', () => {
            try {
                let csv = 'Time,Emotion,Confidence\n';
                state.moodHistory.forEach(entry => {
                    const emotion = emotionData[entry.mood]?.name || entry.mood;
                    csv += `"${entry.time}","${emotion}"\n`;
                });
                downloadFile('mood-beats-export.csv', csv, 'text/csv');
            } catch (error) {
                console.error('Export CSV error:', error);
                alert('Error exporting CSV');
            }
        });
        
        document.getElementById('shareBtn').addEventListener('click', () => {
            try {
                const playlist = playlists[state.currentMood].join(', ');
                const text = `🎵 Check out my MOOD BEATS playlist!\nCurrent Mood: ${emotionData[state.currentMood].name}\nPlaylist: ${playlist}\n\nDownload: https://github.com/yourusername/mood-beats`;
                
                if (navigator.share) {
                    navigator.share({ 
                        title: 'MOOD BEATS Playlist', 
                        text: text 
                    }).catch(err => console.error('Share error:', err));
                } else {
                    // Fallback for browsers without share API
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('Playlist copied to clipboard!');
                }
            } catch (error) {
                console.error('Share error:', error);
            }
        });
        
        function downloadFile(filename, content, mimeType = 'text/plain') {
            try {
                const element = document.createElement('a');
                element.setAttribute('href', 'data:' + mimeType + ';charset=utf-8,' + encodeURIComponent(content));
                element.setAttribute('download', filename);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            } catch (error) {
                console.error('Download error:', error);
                alert('Error downloading file');
            }
        }
        
        // Face detection setup
        async function setupFaceDetection() {
            try {
                elements.loadingOverlay.querySelector('.loading-text').textContent = 'Loading AI Models...';
                
                // Load face-api models from CDN - using the dist folder
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/models/';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                
                elements.loadingOverlay.querySelector('.loading-text').textContent = 'Requesting Camera...';
                
                // Request camera access
                const constraints = {
                    video: {
                        width: { ideal: 320 },
                        height: { ideal: 240 },
                        facingMode: 'user'
                    },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                elements.webcam.srcObject = stream;
                elements.webcam.play();
                
                // Wait for webcam to load
                await new Promise(resolve => {
                    elements.webcam.onloadedmetadata = () => {
                        setTimeout(resolve, 500);
                    };
                });
                
                elements.loadingOverlay.classList.add('hidden');
                
                // Start emotion detection loop
                detectEmotions();
            } catch (error) {
                console.error('Face detection error:', error);
                let errorMsg = 'Using demo mode (mock emotions). Click play to start!';
                if (error.name === 'NotAllowedError') {
                    errorMsg = 'Camera permission denied. Using demo mode (mock emotions).';
                } else if (error.name === 'NotFoundError') {
                    errorMsg = 'No camera found. Using demo mode (mock emotions).';
                } else if (error.name === 'NotReadableError') {
                    errorMsg = 'Camera is in use. Using demo mode (mock emotions).';
                }
                
                // Show demo mode message briefly then hide overlay
                elements.loadingOverlay.innerHTML = `
                    <div style="color: var(--text); text-align: center; padding: 40px;">
                        <div style="font-size: 40px; margin-bottom: 20px;">🎵</div>
                        <div style="font-size: 16px; margin-bottom: 20px;">${errorMsg}</div>
                        <button onclick="document.getElementById('loadingOverlay').classList.add('hidden');" style="padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600;">Start Demo</button>
                    </div>
                `;
                
                // Fallback: Use mock emotions if camera unavailable
                startMockEmotionDetection();
            }
        }
        
        // Mock emotion detection (fallback)
        function startMockEmotionDetection() {
            console.log('Starting mock emotion detection...');
            setInterval(() => {
                const mockEmotions = {
                    happy: Math.random() * 0.3,
                    neutral: Math.random() * 0.3 + 0.3,
                    sad: Math.random() * 0.2,
                    angry: Math.random() * 0.15,
                    surprised: Math.random() * 0.15,
                    fearful: Math.random() * 0.1,
                    disgusted: Math.random() * 0.1
                };
                updateMoodDisplay(mockEmotions);
                updateEqualizer();
            }, 500);
        }
        
        // Emotion detection loop
        async function detectEmotions() {
            try {
                if (elements.webcam.readyState === elements.webcam.HAVE_ENOUGH_DATA) {
                    const detections = await faceapi
                        .detectAllFaces(elements.webcam, new faceapi.TinyFaceDetectorOptions({ inputSize: 320 }))
                        .withFaceExpressions();
                    
                    if (detections.length > 0) {
                        const expressions = detections[0].expressions;
                        updateMoodDisplay(expressions);
                    }
                }
            } catch (error) {
                console.error('Detection error:', error);
            }
            
            updateEqualizer();
            updateSessionStats();
            
            requestAnimationFrame(detectEmotions);
        }
        
        // Initialize on page load
        window.addEventListener('load', () => {
            console.log('MOOD BEATS loaded');
            initAudioContext();
            initializeDisplay();
            setupFaceDetection();
        });
        
        // Initialize display
        function initializeDisplay() {
            // Set initial mood display
            updateMoodDisplay({
                happy: 0.1,
                neutral: 0.7,
                sad: 0.05,
                angry: 0.05,
                surprised: 0.05,
                fearful: 0.02,
                disgusted: 0.03
            });
            
            // Set initial shuffle state
            elements.shuffleBtn.style.opacity = '0.5';
        }
        
        // Update stats regularly
        setInterval(updateSessionStats, 1000);
        
        // Set initial volume
        gainNode.gain.value = 0.5;
    </script>
</body>
</html>
